name: Bug report
description: Report reproducible incorrect behavior.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include private decision data, provider transcripts, credentials, or local filesystem paths.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - Controller or replay
        - Viewer
        - Packaging or installation
        - Documentation
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide sanitized inputs and exact commands.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Relevant proof
      description: Include sanitized error text, logs, or screenshots.
