name: Feature request
description: Describe a user problem and the outcome you want.
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Who has the problem, and when does it occur?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe success without assuming a particular implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or example
      description: Use sanitized examples only.
